name: RoadsideAttraction
options:
  bundleIdPrefix: com.shimondeitel.attractlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RoadsideAttraction:
    type: application
    platform: iOS
    sources:
      - path: RoadsideAttraction
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.attractlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RoadsideAttraction/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RoadsideAttractionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoadsideAttractionTests
      - path: RoadsideAttraction.storekit
    dependencies:
      - target: RoadsideAttraction
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.attractlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RoadsideAttractionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoadsideAttractionUITests
    dependencies:
      - target: RoadsideAttraction
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.attractlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RoadsideAttraction:
    build:
      targets:
        RoadsideAttraction: all
        RoadsideAttractionTests: [test]
        RoadsideAttractionUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RoadsideAttraction.storekit
    test:
      config: Debug
      storeKitConfiguration: RoadsideAttraction.storekit
      targets:
        - RoadsideAttractionTests
        - RoadsideAttractionUITests
    archive:
      config: Release
